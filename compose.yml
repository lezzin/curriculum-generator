services:
  nginx:
    image: nginx:alpine
    ports:
      - "3501:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - shared-network

  frontend:
    environment:
      VITE_API_URL: http://localhost:3501/api
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules      
    networks:
      - shared-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env  
    environment:
      PORT: 3000
      DATABASE_HOST: postgres    
      REDIS_HOST: redis        
      CORS_ORIGIN: http://localhost:3501
      GITHUB_CALLBACK_URL: http://localhost:3501/api/auth/github/callback
      GOOGLE_CALLBACK_URL: http://localhost:3501/api/auth/google/callback
      FRONTEND_URL: http://localhost:3501
    networks:
      - shared-network

networks:
  shared-network:
    external: true  
    name: shared-network
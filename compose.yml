services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3501:3501"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      CORS_ORIGIN: http://localhost:3501
      GITHUB_CALLBACK_URL: http://localhost:3501/api/auth/github/callback
      GOOGLE_CALLBACK_URL: http://localhost:3501/api/auth/google/callback
      FRONTEND_URL: http://localhost:3501
    networks:
      - shared-network

networks:
  shared-network:
    external: true  
    name: shared-network
networks:
  app_network:
    driver: bridge

services:
  backend:
    build: ./backend
    container_name: app_backend
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - DATABASE_HOST=host.docker.internal
      - REDIS_HOST=redis
      - FRONTEND_URL=localhost
    depends_on:
      - redis
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: app_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network
networks:
  app_network:
    driver: bridge

services:
  backend:
    build: ./backend
    container_name: app_backend
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - DATABASE_HOST=host.docker.internal
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio
      - FRONTEND_URL=localhost
    depends_on:
      - redis
    networks:
      - app_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: app_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app_network
      
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

volumes:
  minio_data: